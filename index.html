<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tic tac Toe Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
  <body>
    <h6 id="ply">(2 Players)</h6>
    <h1 id="msg">Let's see , Who's winning ?</h1>

    <!--Main grid-->
    <div id="box" class="container-md">
        <button class="btn btn-outline-secondary" value="0,0"></button>
        <button class="btn btn-outline-secondary" value="0,1"></button>
        <button class="btn btn-outline-secondary" value="0,2"></button>
        <button class="btn btn-outline-secondary" value="1,0"></button>
        <button class="btn btn-outline-secondary" value="1,1"></button>
        <button class="btn btn-outline-secondary" value="1,2"></button>
        <button class="btn btn-outline-secondary" value="2,0"></button>
        <button class="btn btn-outline-secondary" value="2,1"></button>
        <button class="btn btn-outline-secondary" value="2,2"></button>
    </div>

    <!--Reloadng-->
    <h6 id="relode"></h6>

    <!--Logical importing-->
    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
